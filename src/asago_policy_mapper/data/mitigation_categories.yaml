# Mitigation action category and strategy assignments
#
# category — who owns it:
#   technical:   Engineering deploys it (guardrails, filtering, access controls)
#   operational: Ops/QA teams execute it (testing, monitoring, audits, incident response)
#   governance:  Leadership/compliance owns it (policies, oversight, disclosure, training)
#
# strategy — DPV risk control type (https://w3id.org/dpv/risk), when in the
#            risk lifecycle the control acts:
#   AvoidanceControl:     Prevent risk entirely (policy/design decisions)
#   MitigationControl:    Reduce likelihood/severity (guardrails, filters)
#   ModificationControl:  Change context to change risk characteristics
#   MonitorControl:       Observe/detect/log (monitoring, testing, auditing)
#   InterruptionControl:  Halt ongoing event
#   InterventionControl:  Intervene to prevent escalation
#   ReductionControl:     Reduce effects after occurrence
#   ResolutionControl:    Fix/recover (includes recovery, remediation, reversal)
#   InvestigationControl: Investigate and learn post-incident
#   OverrideControl:      Override usual processes in response
#   TransferControl:      Transfer/share risk to another entity

# ── Structural rules ──────────────────────────────────────────────────────
# Applied automatically by the build script based on action ID structure.

nist_prefixes:
  GV: {category: governance,  risk_control: AvoidanceControl}      # Govern — governance decisions
  MP: {category: operational, risk_control: MonitorControl}        # Map — risk identification
  MS: {category: operational, risk_control: MonitorControl}        # Measure — monitoring/measurement
  MG: {category: technical,   risk_control: MitigationControl}     # Manage — deploy countermeasures

aiuc1_prefixes:
  a: {category: technical,   risk_control: MitigationControl}      # Data & Privacy
  b: {category: technical,   risk_control: MitigationControl}      # Security
  c: {category: operational, risk_control: MitigationControl}      # Safety
  d: {category: operational, risk_control: MonitorControl}         # Reliability
  e: {category: governance,  risk_control: MonitorControl}         # Accountability
  f: {category: governance,  risk_control: AvoidanceControl}       # Society

# ── Explicit action assignments ───────────────────────────────────────────

actions:
  # ── OWASP LLM Top 10 v2.0 ────────────────────────────────────────────

  # LLM01: Prompt Injection
  owasp-llm-act-01-01: {category: technical,   risk_control: MitigationControl}     # Constrain model behavior via system prompt
  owasp-llm-act-01-02: {category: technical,   risk_control: MitigationControl}     # Define and validate expected output formats
  owasp-llm-act-01-03: {category: technical,   risk_control: MitigationControl}     # Implement input and output filtering
  owasp-llm-act-01-04: {category: technical,   risk_control: MitigationControl}     # Enforce privilege control and least privilege
  owasp-llm-act-01-05: {category: operational, risk_control: InterventionControl}   # Require human approval for high-risk actions
  owasp-llm-act-01-06: {category: technical,   risk_control: MitigationControl}     # Segregate and identify external content
  owasp-llm-act-01-07: {category: operational, risk_control: MonitorControl}        # Conduct adversarial testing for prompt injection

  # LLM02: Sensitive Information Disclosure
  owasp-llm-act-02-01: {category: technical,   risk_control: MitigationControl}     # Integrate data sanitization techniques
  owasp-llm-act-02-02: {category: technical,   risk_control: MitigationControl}     # Apply strict input validation for sensitive data
  owasp-llm-act-02-03: {category: technical,   risk_control: MitigationControl}     # Enforce access controls for sensitive data
  owasp-llm-act-02-04: {category: technical,   risk_control: ModificationControl}   # Utilize federated learning
  owasp-llm-act-02-05: {category: technical,   risk_control: MitigationControl}     # Incorporate differential privacy
  owasp-llm-act-02-06: {category: governance,  risk_control: AvoidanceControl}      # Educate users on safe LLM usage
  owasp-llm-act-02-07: {category: governance,  risk_control: MonitorControl}        # Ensure transparency in data usage policies
  owasp-llm-act-02-08: {category: technical,   risk_control: MitigationControl}     # Conceal system preamble from users
  owasp-llm-act-02-09: {category: technical,   risk_control: MitigationControl}     # Implement tokenization and redaction

  # LLM03: Supply Chain Vulnerabilities
  owasp-llm-act-03-01: {category: operational, risk_control: MonitorControl}        # Vet data sources and suppliers
  owasp-llm-act-03-02: {category: operational, risk_control: MonitorControl}        # Apply vulnerability scanning and patching
  owasp-llm-act-03-03: {category: operational, risk_control: MonitorControl}        # Red team third-party models before adoption
  owasp-llm-act-03-04: {category: operational, risk_control: MonitorControl}        # Maintain AI and software bill of materials
  owasp-llm-act-03-05: {category: governance,  risk_control: MonitorControl}        # Audit licenses via bill of materials
  owasp-llm-act-03-06: {category: operational, risk_control: MonitorControl}        # Use verifiable model sources with integrity checks
  owasp-llm-act-03-07: {category: operational, risk_control: MonitorControl}        # Monitor collaborative model development environments
  owasp-llm-act-03-08: {category: operational, risk_control: MonitorControl}        # Test supplied models for tampering and poisoning
  owasp-llm-act-03-09: {category: operational, risk_control: ResolutionControl}     # Implement patching policy for AI components
  owasp-llm-act-03-10: {category: technical,   risk_control: MitigationControl}     # Encrypt and verify models at AI edge

  # LLM04: Data and Model Poisoning
  owasp-llm-act-04-01: {category: operational, risk_control: MonitorControl}        # Track data origins and transformations
  owasp-llm-act-04-02: {category: operational, risk_control: MonitorControl}        # Vet data vendors and validate outputs
  owasp-llm-act-04-03: {category: technical,   risk_control: MitigationControl}     # Sandbox model exposure to unverified data
  owasp-llm-act-04-04: {category: operational, risk_control: MonitorControl}        # Use data version control
  owasp-llm-act-04-05: {category: technical,   risk_control: ModificationControl}   # Use vector database for user-provided information
  owasp-llm-act-04-06: {category: operational, risk_control: MonitorControl}        # Red team for data poisoning robustness
  owasp-llm-act-04-07: {category: operational, risk_control: MonitorControl}        # Monitor training loss for poisoning indicators
  owasp-llm-act-04-08: {category: technical,   risk_control: MitigationControl}     # Use RAG and grounding to reduce hallucination

  # LLM05: Improper Output Handling
  owasp-llm-act-05-01: {category: technical,   risk_control: MitigationControl}     # Treat model as untrusted user (zero-trust)
  owasp-llm-act-05-02: {category: technical,   risk_control: MitigationControl}     # Apply OWASP ASVS for output validation
  owasp-llm-act-05-03: {category: technical,   risk_control: MitigationControl}     # Encode model output to prevent code execution
  owasp-llm-act-05-04: {category: technical,   risk_control: MitigationControl}     # Use parameterized queries for LLM output
  owasp-llm-act-05-05: {category: technical,   risk_control: MitigationControl}     # Employ Content Security Policies
  owasp-llm-act-05-06: {category: operational, risk_control: MonitorControl}        # Log and monitor LLM output patterns

  # LLM06: Excessive Agency
  owasp-llm-act-06-01: {category: technical,   risk_control: AvoidanceControl}      # Minimize LLM agent extensions
  owasp-llm-act-06-02: {category: technical,   risk_control: AvoidanceControl}      # Minimize extension functionality
  owasp-llm-act-06-03: {category: technical,   risk_control: AvoidanceControl}      # Avoid open-ended extensions
  owasp-llm-act-06-04: {category: technical,   risk_control: MitigationControl}     # Minimize extension permissions
  owasp-llm-act-06-05: {category: technical,   risk_control: MitigationControl}     # Execute extensions in user context
  owasp-llm-act-06-06: {category: operational, risk_control: InterventionControl}   # Require user approval for high-impact actions
  owasp-llm-act-06-07: {category: technical,   risk_control: MitigationControl}     # Implement complete mediation in downstream systems
  owasp-llm-act-06-08: {category: technical,   risk_control: ReductionControl}      # Rate limit agent actions
  owasp-llm-act-06-09: {category: operational, risk_control: MonitorControl}        # Log and monitor agent extension activity

  # LLM07: System Prompt Leakage
  owasp-llm-act-07-01: {category: technical,   risk_control: AvoidanceControl}      # Separate sensitive data from system prompts
  owasp-llm-act-07-02: {category: governance,  risk_control: AvoidanceControl}      # Do not rely on system prompts for behavior control
  owasp-llm-act-07-03: {category: technical,   risk_control: MitigationControl}     # Implement guardrails outside the LLM
  owasp-llm-act-07-04: {category: technical,   risk_control: MitigationControl}     # Enforce security controls independently from LLM

  # LLM08: Vector and Embedding Weaknesses
  owasp-llm-act-08-01: {category: technical,   risk_control: MitigationControl}     # Implement permission-aware vector stores
  owasp-llm-act-08-02: {category: operational, risk_control: MonitorControl}        # Validate knowledge base data integrity
  owasp-llm-act-08-03: {category: operational, risk_control: MonitorControl}        # Review and classify merged knowledge base data
  owasp-llm-act-08-04: {category: operational, risk_control: MonitorControl}        # Maintain immutable retrieval activity logs

  # LLM09: Misinformation
  owasp-llm-act-09-01: {category: technical,   risk_control: MitigationControl}     # Use RAG for verified information retrieval
  owasp-llm-act-09-02: {category: technical,   risk_control: ModificationControl}   # Fine-tune models to improve output quality
  owasp-llm-act-09-03: {category: operational, risk_control: InterventionControl}   # Implement cross-checking and human oversight
  owasp-llm-act-09-04: {category: operational, risk_control: MonitorControl}        # Automatically validate key outputs
  owasp-llm-act-09-05: {category: governance,  risk_control: MonitorControl}        # Communicate misinformation risks to users
  owasp-llm-act-09-06: {category: operational, risk_control: MonitorControl}        # Establish secure coding practices for AI code
  owasp-llm-act-09-07: {category: governance,  risk_control: AvoidanceControl}      # Design APIs and UIs for responsible LLM use
  owasp-llm-act-09-08: {category: governance,  risk_control: AvoidanceControl}      # Train users on LLM limitations and verification

  # LLM10: Unbounded Consumption
  owasp-llm-act-10-01: {category: technical,   risk_control: MitigationControl}     # Validate input size limits
  owasp-llm-act-10-02: {category: technical,   risk_control: MitigationControl}     # Limit exposure of logits and logprobs
  owasp-llm-act-10-03: {category: technical,   risk_control: ReductionControl}      # Apply rate limiting and user quotas
  owasp-llm-act-10-04: {category: operational, risk_control: MonitorControl}        # Monitor and manage resource allocation dynamically
  owasp-llm-act-10-05: {category: technical,   risk_control: InterruptionControl}   # Set timeouts and throttle resource-intensive ops
  owasp-llm-act-10-06: {category: technical,   risk_control: MitigationControl}     # Sandbox LLM access to network and services
  owasp-llm-act-10-07: {category: operational, risk_control: MonitorControl}        # Monitor for anomalous resource consumption
  owasp-llm-act-10-08: {category: technical,   risk_control: MonitorControl}        # Implement output watermarking
  owasp-llm-act-10-09: {category: technical,   risk_control: ResolutionControl}     # Design for graceful degradation under load
  owasp-llm-act-10-10: {category: technical,   risk_control: ReductionControl}      # Limit queued actions and implement dynamic scaling
  owasp-llm-act-10-11: {category: technical,   risk_control: MitigationControl}     # Train models for adversarial robustness
  owasp-llm-act-10-12: {category: technical,   risk_control: MitigationControl}     # Filter glitch tokens
  owasp-llm-act-10-13: {category: technical,   risk_control: MitigationControl}     # Implement access controls for model repositories
  owasp-llm-act-10-14: {category: operational, risk_control: MonitorControl}        # Use centralized ML model registry
  owasp-llm-act-10-15: {category: operational, risk_control: MonitorControl}        # Implement automated MLOps deployment governance

