- id: atlas-confidential-data-in-prompt
  name: Confidential data in prompt
  evidence:
  - text: 'Under no circumstances should personal identifiable or business sensitive information be entered into a Large Language Model (LLM) or publicly available Artificial Intelligence (AI) solution.
      This includes but is not limited to: Sensitive information; Patient Information; Staff Information; Intellectual Property; Proprietary Code or proprietary information; Passwords; Keys; credit card
      numbers or other financial information.'
    section: 8 Do's and Don'ts
  - text: Data marked as Sensitive/Highly Sensitive or restricted must not be used in AI solutions unless wholly owned by the Trust and supported by appropriate contractual clauses.
    section: 5.4 Information Governance and Resilience
  - text: Input of Trust sensitive and proprietary data outside of those approved in 5.6.2 into public, free or publicly available AI tools such as ChatGPT or OSINT tools will be considered a data breach.
    section: 5.6 Information Governance and Security Incidents
