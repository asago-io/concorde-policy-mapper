  name: Mass surveillance and privacy attacks (Slattery et al., 2024)
  evidence:
  - text: surveillance concerns  [eg.RIPA]
  - text: Remember that providers can and do monitor conversations to improve their systems and ensure the content complies with their own policies and safety requirements.
- id: credo-risk-030
  name: Integration challenges with existing systems
  evidence:
  - text: Don't integrate any AI technology with Trust systems without the correct due diligence and approval.
  - text: Don't install or use a solution that will require an unauthorised change to Trust systems including desktops, firewall rules, etc.
- id: mit-ai-risk-subdomain-6.3
  name: Economic and cultural devaluation of human effort
  evidence:
  - text: Passing off work generated by AI is not acceptable, and will be treated as seriously as plagiarism.
