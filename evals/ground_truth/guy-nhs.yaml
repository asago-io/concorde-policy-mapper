- id: atlas-over-or-under-reliance
  name: Over- or under-reliance
  evidence:
  - text: LLMs should be used with caution, and their output should always be verified via human intervention.
    section: 5.4 Information Governance and Resilience
  - text: LLMs are trained on massive datasets of text and code, and are still under development. They can sometimes generate incorrect or misleading information that can appear correct.
    section: 5.4 Information Governance and Resilience
  - text: Output from LLMs should be validated and correlated with other trusted sources of information. Fact-check all content. False positives and negatives do occur.
    section: 8 Do's and Don'ts
