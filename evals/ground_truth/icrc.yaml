  - id: atlas-revealing-confidential-information
    name: Revealing Confidential Information
    evidence:
      - text: "At all times, the ICRC ensures that confidential or sensitive internal ICRC information or personal data are handled with the utmost care and are not used in or transferred to non-approved, external online AI systems, in line with the duty of discretion stated in the ICRC's Code of Conduct."
        section: "6. GUIDING PRINCIPLES - Safety and security"
      - text: "Awareness-raising, training and compliance efforts are made to ensure that (i) the ICRC's use of AI solutions does not breach applicable international, regional and national legal restrictions, and that (ii) ICRC staff and users do not input any critical humanitarian information, other confidential and/or strictly confidential information, or any proprietary information protected by intellectual property rights when using external or commercial online AI services."
        section: "6. GUIDING PRINCIPLES - Responsibility and accountability"

