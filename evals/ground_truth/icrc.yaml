  evidence:
  - text: the speed and scale of AI-related innovations in the past few years, the emergence of new technological tools, their simplified accessibility, push-and-pull factors inside and outside the ICRC,
      and ongoing debates about the opportunities and risks they create - including for humanitarian action - have triggered a need to ensure that the organization is adequately equipped to explore and
      manage these developments in a timely, coherent and responsible manner.
