- id: atlas-impact-on-affected-communities
  name: Impact on Affected Communities
  evidence:
  - text: In line with the 'do no harm' principle, the ICRC systematically assesses the potential negative short- and long-term secondary impacts that the use of AI solutions may have on the safety, dignity,
      agency and respect for the fundamental rights of affected people and takes all possible measures to avoid and mitigate them.
    section: 5. VALUE-BASED APPROACH - Humanity
- id: atlas-dangerous-use
  name: Dangerous Use
  evidence:
  - text: 'the ICRC will refrain from using, deploying or providing AI systems that: deploy subliminal, manipulative, or deceptive techniques to distort behaviour and impair informed decision-making'
    section: 5. VALUE-BASED APPROACH - Humanity
- id: atlas-exclusion
  name: Exclusion
  evidence:
  - text: 'the ICRC will refrain from using, deploying or providing AI systems that: exploit vulnerabilities related to age, disability, or socio-economic circumstances to distort behaviour'
    section: 5. VALUE-BASED APPROACH - Humanity
  - text: The ICRC makes all possible efforts to ensure that the AI solutions and tools we use are inclusive by design and in their impact, and that they enable fair, non-discriminatory, equal and equitable
      delivery of assistance and services to all affected people and users, taking into account the varying degrees of need and capacity.
    section: 5. VALUE-BASED APPROACH - Impartiality
- id: credo-risk-048
  name: Third-Party Dependencies
  evidence:
  - text: we strive to explore available, safe and adequate free and/or open-source AI solutions to mitigate risks of increased dependency on politicized or proprietary tools and systems that could (i)
      jeopardize the perception of our neutrality and independence from entities involved in political or conflict-related controversies; (ii) endanger our operational independence and autonomy; or (iii)
      restrict our ability to opt for alternatives without incurring disproportionate costs.
    section: 5. VALUE-BASED APPROACH - Neutrality and independence
