- id: atlas-over-or-under-reliance
  name: Over or Under Reliance
  evidence:
  - text: The ICRC pays specific attention to ensure that the use and development of AI solutions do not jeopardize our ability to demonstrate humanity and empathy through direct and in-person human engagement
      in the delivery of our external and internal activities and programmes.
    section: 5. VALUE-BASED APPROACH - Humanity
  - text: We focus on AI solutions that can enhance human autonomy and agency and complement face-to-face human interactions, as well as our physical presence and proximity with affected people.
    section: 5. VALUE-BASED APPROACH - Humanity
