  - id: atlas-impact-on-the-environment
    name: Impact on the Environment
    evidence:
      - text: "All possible efforts are made to integrate and mitigate the environmental impact and carbon footprint of considered AI solutions through a life-cycle approach. This includes favouring solutions and tools that have a lighter footprint, in line with the ICRC's Plan of Action under the Climate and Environment Charter for Humanitarian Organizations and the ICRC's Framework for Sustainable Development."
        section: "6. GUIDING PRINCIPLES - Responsibility and accountability"

