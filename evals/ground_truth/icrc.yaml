- id: credo-risk-041
  name: Vulnerability to Adversarial Attacks
  evidence:
  - text: Risks of misuse, abuse, infiltration and attacks against AI systems and potential related harms and damage are systematically considered, and the highest possible standards of data protection
      and cybersecurity measures are put in place to prevent and mitigate them, in line with assessed risk levels.
    section: 6. GUIDING PRINCIPLES - Safety and security
- id: mit-ai-risk-subdomain-2.2
  name: Security
  evidence:
  - text: Risks of misuse, abuse, infiltration and attacks against AI systems and potential related harms and damage are systematically considered, and the highest possible standards of data protection
      and cybersecurity measures are put in place to prevent and mitigate them, in line with assessed risk levels.
    section: 6. GUIDING PRINCIPLES - Safety and security
- id: atlas-revealing-confidential-information
  name: Revealing Confidential Information
  evidence:
  - text: At all times, the ICRC ensures that confidential or sensitive internal ICRC information or personal data are handled with the utmost care and are not used in or transferred to non-approved, external
      online AI systems, in line with the duty of discretion stated in the ICRC's Code of Conduct.
    section: 6. GUIDING PRINCIPLES - Safety and security
  - text: Awareness-raising, training and compliance efforts are made to ensure that (i) the ICRC's use of AI solutions does not breach applicable international, regional and national legal restrictions,
      and that (ii) ICRC staff and users do not input any critical humanitarian information, other confidential and/or strictly confidential information, or any proprietary information protected by intellectual
      property rights when using external or commercial online AI services.
    section: 6. GUIDING PRINCIPLES - Responsibility and accountability
- id: atlas-confidential-information-in-data
  name: Confidential Information in Data
  evidence:
  - text: At all times, the ICRC ensures that confidential or sensitive internal ICRC information or personal data are handled with the utmost care and are not used in or transferred to non-approved, external
      online AI systems, in line with the duty of discretion stated in the ICRC's Code of Conduct.
    section: 6. GUIDING PRINCIPLES - Safety and security
- id: credo-risk-037
  name: Compromised Sensitive Information
  evidence:
  - text: At all times, the ICRC ensures that confidential or sensitive internal ICRC information or personal data are handled with the utmost care and are not used in or transferred to non-approved, external
      online AI systems, in line with the duty of discretion stated in the ICRC's Code of Conduct.
    section: 6. GUIDING PRINCIPLES - Safety and security
- id: atlas-data-privacy-rights
  name: Data Privacy Rights
  evidence:
  - text: Mechanisms are put in place to ensure that the data required for AI systems is collected, used, shared, archived and deleted in ways that are consistent with the right to privacy of affected people
      and users.
    section: 6. GUIDING PRINCIPLES - Safety and security
  - text: Systematic data protection impact assessments are carried out prior to the acquisition, deployment or use of considered AI solutions, and when relevant and feasible, solutions are put in place
      to restrict processing and enable rectification and/or erasure of the data used.
    section: 6. GUIDING PRINCIPLES - Safety and security
