        section: "6. GUIDING PRINCIPLES - Transparency and 'explainability'"

  - id: atlas-legal-accountability
    name: Legal Accountability
    evidence:
      - text: "The ICRC ensures the highest possible levels of responsibility and accountability in the use and management of AI solutions through continuous monitoring, assessment and reporting on the procurement, use, management and review of AI solutions – including through publicly accessible reporting, when relevant."
        section: "6. GUIDING PRINCIPLES - Responsibility and accountability"
      - text: "Responsibility and accountability for decision-making supported by AI always lies with the ICRC and/or the staff using the tools or system concerned, in line with the ICRC's Code of Conduct and other applicable internal rules."
        section: "6. GUIDING PRINCIPLES - Responsibility and accountability"

