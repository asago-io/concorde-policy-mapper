      - text: "The ICRC makes all possible efforts to ensure that the AI solutions and tools we use are inclusive by design and in their impact, and that they enable fair, non-discriminatory, equal and equitable delivery of assistance and services to all affected people and users, taking into account the varying degrees of need and capacity."
        section: "5. VALUE-BASED APPROACH - Impartiality"

  - id: credo-risk-048
    name: Third-Party Dependencies
    evidence:
      - text: "we strive to explore available, safe and adequate free and/or open-source AI solutions to mitigate risks of increased dependency on politicized or proprietary tools and systems that could (i) jeopardize the perception of our neutrality and independence from entities involved in political or conflict-related controversies; (ii) endanger our operational independence and autonomy; or (iii) restrict our ability to opt for alternatives without incurring disproportionate costs."
        section: "5. VALUE-BASED APPROACH - Neutrality and independence"

