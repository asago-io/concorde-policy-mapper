  - id: credo-risk-034
    name: Oversight and Evaluation Challenges
    evidence:
      - text: "Systematic review and auditing systems supported by regular internal and external feedback mechanisms are put in place to ensure a continuous and multidimensional risks analysis based on their likelihood and the severity of their potential impact for affected populations, users or the organization, including from a legal perspective."
        section: "6. GUIDING PRINCIPLES - Proportionality, precaution, and do no harm"
      - text: "When relevant and feasible, systematic impact, verifiability and replicability assessments are put in place and supported by effective evaluation and auditing processes to ensure the ICRC's AI systems and tools comply with this policy."
        section: "6. GUIDING PRINCIPLES - Responsibility and accountability"

