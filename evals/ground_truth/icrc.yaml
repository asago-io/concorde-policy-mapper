  - text: The ICRC acknowledges the significant risks of AI systems that could generate false or inaccurate data and replicate or amplify systemic and societal discriminations, biases and stereotypes –
      in particular around gender and race.
    section: 5. VALUE-BASED APPROACH - Impartiality
