- id: credo-risk-017
  name: Inadequate AI Literacy and Communication
  evidence:
  - text: The ICRC invests in adapted learning and development programmes to support our staff members' understanding of what AI systems are, how they function and what opportunities and risks they bring
      in relation to staff members' professional activities. This includes awareness and understanding of the ethical considerations and different internal rules and regulations that apply to AI internal
      and external tools and technologies.
    section: 5. VALUE-BASED APPROACH - Competence and capacity building
  - text: When necessary, the ICRC restricts access to AI tools to specifically trained and authorized personnel.
    section: 5. VALUE-BASED APPROACH - Competence and capacity building
- id: atlas-human-exploitation
