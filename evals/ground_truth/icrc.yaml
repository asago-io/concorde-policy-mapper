  - id: atlas-nonconsensual-use
    name: Nonconsensual Use
    evidence:
      - text: "Provided that it does not prevent affected people from benefiting from equivalent opportunities, the possibility of opting out of AI systems and having access to alternative solutions and complaint and remedy mechanisms are made available to them."
        section: "6. GUIDING PRINCIPLES - Responsibility and accountability"

  - id: ai-risk-taxonomy-social-scoring
    name: Social Scoring
    evidence:
      - text: "In light of the above, the ICRC will refrain from using, deploying or providing AI systems that: deploy subliminal, manipulative, or deceptive techniques to distort behaviour and impair informed decision-making; exploit vulnerabilities related to age, disability, or socio-economic circumstances to distort behaviour; use biometric categorization systems that infer sensitive personal attributes, except for labelling or filtering lawfully acquired biometric datasets; rely on or infer social scoring, (i.e. evaluating or classifying individuals or groups based on social behaviour or personal traits); assess the risk of an individual committing a criminal offence based solely on profiling or personality traits, except when used to augment human assessments; compile facial recognition databases by untargeted scraping of facial images from the internet or CCTV footage; or infer emotions, except for medical or safety reasons."
        section: "5. VALUE-BASED APPROACH - Humanity"

  - id: ai-risk-taxonomy-non-consensual-tracking/monitoring/stalking/spyware---biometric-data-(facial-recognition)
    name: Non-consensual Tracking/Monitoring/Stalking/Spyware - Biometric Data (Facial Recognition)
    evidence:
