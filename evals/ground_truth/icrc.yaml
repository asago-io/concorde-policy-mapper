  - id: atlas-lack-of-system-transparency
    name: Lack of System Transparency
    evidence:
      - text: "Transparency and 'explainability' are essential elements of a safe, ethical and responsible approach to AI, and to ensure respect for the ICRC's principles, rules and values. The ICRC therefore ensures at all times the highest possible levels of transparency in our use and management of AI solutions, in accordance with the context, risks and impact of the systems and tools considered, and with due consideration to the principles of safety, security and privacy."
        section: "6. GUIDING PRINCIPLES - Transparency and 'explainability'"

  - id: atlas-lack-of-model-transparency
    name: Lack of Model Transparency
    evidence:
      - text: "As much as feasible and in accordance with the applicable risk level, context and use case, meaningful traceability, disclosure and notification measures are put in place in relation to the use of AI systems that support the ICRC's activities and decision-making processes, including, as appropriate, releasing AI systems as open-source."
        section: "6. GUIDING PRINCIPLES - Transparency and 'explainability'"

  - id: atlas-unexplainable-output
    name: Unexplainable Output
    evidence:
      - text: "Relevant and intelligible information about the use of AI systems is systematically provided to affected people and users when these systems could have an impact on them or their rights, or when decisions with significant consequences for the organization are concerned."
        section: "6. GUIDING PRINCIPLES - Transparency and 'explainability'"
      - text: "This includes adequate and meaningful information about why, when and how AI solutions are used, and explanations on the causal link between AI inputs and outputs and the functioning of algorithmic processes."
        section: "6. GUIDING PRINCIPLES - Transparency and 'explainability'"

  - id: atlas-non-disclosure
    name: Non-disclosure
    evidence:
