risks:
- id: atlas-decision-bias
  name: Decision Bias
  evidence:
  - text: there have been concerning examples of the use of AI in policing, where models have been built on data that led them to act disproportionately against a community or race.
    section: 1 Introduction
  - text: Those responsible for AI-enabled systems must proactively mitigate the risk of unintended biases or harms, during initial rollout and as they learn, change, or are redeployed.
    section: 2 Principles of AI in Policing - Principle D. Responsible
- id: atlas-data-bias
  name: Data Bias
  evidence:
  - text: all data used in Police AI will be subject to a Framework outlined by a force governance board to guard against issues such as bias, unintended proxies, non-representativeness, unfairness, and
      untimeliness.
    section: 2 Principles of AI in Policing - Principle F. Robust
  - text: Forces should ensure the public are aware of AI uses. This will typically include publishing an overview of the algorithms used and the known limitations of the training data used.
    section: 2 Principles of AI in Policing - Principle B. Transparent
- id: atlas-output-bias
  name: Output Bias
  evidence:
  - text: there have been concerning examples of the use of AI in policing, where models have been built on data that led them to act disproportionately against a community or race.
    section: 1 Introduction
  - text: promoting non-discriminatory practices in the use of AI
    section: 3 Governance of AI and the AI Principles
- id: atlas-over-or-under-reliance
  name: Over or Under Reliance on AI
  evidence:
  - text: All AI that affects the public will have responsible usage policies (i.e., intensions are defined before deployment so that outcomes and impact can be tracked) and procedures to ensure that users
      do not accept AI outputs uncritically.
    section: 2 Principles of AI in Policing - Principle D. Responsible
- id: atlas-lack-of-system-transparency
  name: Lack of System Transparency
  evidence:
  - text: All use of AI will be subject to 'Maximum Transparency by Default' (MTbD).
    section: 2 Principles of AI in Policing - Principle B. Transparent
  - text: Forces should ensure the public are aware of AI uses. This will typically include publishing an overview of the algorithms used and the known limitations of the training data used.
    section: 2 Principles of AI in Policing - Principle B. Transparent
- id: atlas-lack-of-model-transparency
  name: Lack of Model Transparency
  evidence:
  - text: 'Subject to B2, all AI projects must be able to allow a third-party to: (1) investigate the algorithmic workings, use scenarios, and underlying data from an ''adversarial perspective'''
    section: 2 Principles of AI in Policing - Principle B. Transparent
- id: atlas-unexplainable-output
  name: Unexplainable Output
  evidence:
  - text: The ability for any AI to provide an 'explanation' of its output will be a determining factor in its implementation.
    section: 2 Principles of AI in Policing - Principle C. Explainable
  - text: The level of explanation expected will be determined by (1) the function it performs (e.g., is it informing a high-impact decision about an individual); (2) the outputs required of it (i.e., who
      needs to understand what regarding the output and how was this reached).
    section: 2 Principles of AI in Policing - Principle C. Explainable
- id: atlas-legal-accountability
  name: Legal Accountability
  evidence:
  - text: All AI will have a clearly identified individual accountable for its operation and outputs.
    section: 2 Principles of AI in Policing - Principle E. Accountable
  - text: The use of AI in policing will be subject to proper governance and oversight at the relevant organisational level.
    section: 2 Principles of AI in Policing - Principle E. Accountable
- id: atlas-impact-on-human-agency
  name: Impact on Human Agency
  evidence:
  - text: All AI that effects the public must have a human as the ultimate decision-maker.
    section: 2 Principles of AI in Policing - Principle D. Responsible
  - text: The ability of AI to make decisions without a human being part of that decision will be determined by the function that the AI performs.
    section: 2 Principles of AI in Policing - Principle D. Responsible
- id: atlas-impact-on-affected-communities
  name: Impact on Affected Communities
  evidence:
  - text: there have been concerning examples of the use of AI in policing, where models have been built on data that led them to act disproportionately against a community or race.
    section: 1 Introduction
  - text: Critically, the fear of unintended consequences and impingement of civil liberties, deservedly or not, is associated with policing's use of AI.
    section: 1 Introduction
- id: atlas-unrepresentative-data
  name: Unrepresentative Data
  evidence:
  - text: all data used in Police AI will be subject to a Framework outlined by a force governance board to guard against issues such as bias, unintended proxies, non-representativeness, unfairness, and
      untimeliness.
    section: 2 Principles of AI in Policing - Principle F. Robust
- id: atlas-poor-model-accuracy
  name: Poor Model Accuracy
  evidence:
  - text: undertaking regular reviews of the accuracy, reliability, security, safety, performance, evidence-based decision capability and feedback ability of all AI.
    section: 3 Governance of AI and the AI Principles
  - text: All data used to train, or that is analysed by, an AI will be robust and reliable enough for its intended purpose. This requires assessing, tracking and reporting on the quality of data, by way
      of recognising that the quality of data dictates the quality of the analysis.
    section: 2 Principles of AI in Policing - Principle F. Robust
- id: atlas-data-usage
  name: Data Usage
  evidence:
  - text: All use of AI will comply with applicable laws, standards, and regulations. This includes all users of AI, ML, ADA and related data processing (e.g., where you are using national data sets as
      defined by the NPCC) ensuring the use is recorded centrally in the National ROPA.
    section: 2 Principles of AI in Policing - Principle A. Lawful
  - text: AI enabled data sets and technology systems will be governed and assured under the same frameworks as wider data processing responsibilities, linking what is used and how it is used to the appropriate
      IAR and ROPA.
    section: 2 Principles of AI in Policing - Principle E. Accountable
- id: atlas-data-privacy-rights
  name: Data Privacy Rights
  evidence:
  - text: Together with Police and Crime Commissioners (PCC), who are responsible for holding Chief Constables to account, they ensure use is fair and lawful, balancing ethics, right to privacy, unbiased
      treatment and consent, with the absolute right to a fair trial.
    section: 3 Governance of AI and the AI Principles
- id: atlas-personal-information-in-data
  name: Personal Information in Data
  evidence:
  - text: balancing ethics, right to privacy, unbiased treatment and consent, with the absolute right to a fair trial.
    section: 3 Governance of AI and the AI Principles
  - text: All third parties will have appropriate data protection and information security policies in place.
    section: 2 Principles of AI in Policing - Principle B. Transparent
