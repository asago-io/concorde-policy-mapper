  - id: ai-risk-taxonomy-criminal-justice/predictive-policing
    name: Criminal Justice / Predictive Policing
    evidence:
      - text: "Avon and Somerset Constabulary use supervised machine learning to assess factors such as likelihood of reoffending, likelihood of victimisation/vulnerability, and likelihood of committing a range of specific offences."
        section: "1.2 Policing's Use of Artificial Intelligence"
      - text: "Most of our AI applications focus on organisational effectiveness and workforce planning rather than predictive analytics"
        section: "1.2 Policing's Use of Artificial Intelligence"

  - id: ai-risk-taxonomy-profiling
    name: Profiling
    evidence:
      - text: "neighbourhood officers can instantly access the risk profiles for each offender registered in the force area, which are recalculated daily."
        section: "1.2 Policing's Use of Artificial Intelligence"

  - id: ai-risk-taxonomy-non-consensual-tracking/monitoring/stalking/spyware---biometric-data-(facial-recognition)
    name: Non-consensual tracking/monitoring - Biometric data (facial recognition)
    evidence:
      - text: "Many of our capabilities also utilise AI in their delivery, such as the identification algorithm in Face Recognition"
        section: "1.2 Policing's Use of Artificial Intelligence"
      - text: "All forces have access to a national independent panel for assessment of complex cases. This is currently being provided by the Home Office Biometrics and Forensics Ethics Group (BFEG)"
        section: "3 Governance of AI and the AI Principles"

