    section: 1.2 Policing's Use of Artificial Intelligence
  - text: All forces have access to a national independent panel for assessment of complex cases. This is currently being provided by the Home Office Biometrics and Forensics Ethics Group (BFEG)
    section: 3 Governance of AI and the AI Principles
