# reviewed: 2026-05-31
risks:
  - id: atlas-personal-information-in-prompt
    name: Personal Information in Prompt
    evidence:
      - text: "AI users are prohibited from inputting data specific to St. John's University, including confidential or proprietary business information belonging to the University when using commercially, publicly available AI tools. This includes but is not limited to copying, pasting, typing, or in any way submitting personal information (e.g., names, contact information, dates of birth, social security numbers, etc.) about employees, students, and other members of the St. John's community into AI tools."
        section: "Policy"
      - text: "Inputs into AI prompts via text, speech, images, or any other means must be anonymized to avoid disclosing confidential University information."
        section: "Policy"

  - id: atlas-confidential-data-in-prompt
    name: Confidential Data in Prompt
    evidence:
      - text: "AI users are prohibited from inputting data specific to St. John's University, including confidential or proprietary business information belonging to the University when using commercially, publicly available AI tools."
        section: "Policy"
      - text: "Only data classified as low risk (including public data) in accordance with the University's Policy 922 - Information Classification Policy, may be used in AI tools and services. Information entered into AI engines opens up the data to be searchable through the public internet."
        section: "Policy"

  - id: atlas-revealing-confidential-information
    name: Revealing Confidential Information
    evidence:
      - text: "Information entered into AI engines opens up the data to be searchable through the public internet."
        section: "Policy"
      - text: "All data that will or could be typed or entered into the AI tool or service must be evaluated in accordance with the University's data classification and use policies. This will enable the University to continue to protect sensitive data in accordance with privacy and security laws while still taking advantage of emerging benefits of AI."
        section: "Policy"

  - id: atlas-decision-bias
    name: Decision Bias
    evidence:
      - text: "Biases are inherent in AI, especially when using Generative AI tools. Information should be carefully reviewed for these biases (both unconscious and conscious), as well as validation of answers. Fact-checking information is necessary before answers are considered absolute and used in any decision-making capacity."
        section: "Policy"

  - id: atlas-output-bias
    name: Output Bias
    evidence:
      - text: "All AI-generated content must be carefully reviewed for accuracy, appropriateness, and bias before relying on it for work purposes."
        section: "Policy"
      - text: "AI users are responsible for ensuring that the AI-generated content aligns with the University's mission and values, and should actively work to identify and mitigate biases in AI systems."
        section: "Policy"

  - id: atlas-hallucination
    name: Hallucination
    evidence:
