  - id: atlas-over-or-under-reliance
    name: Over- or under-reliance
    evidence:
      - text: "While AI is transformative and has potential to make our work more efficient, tasks should be evaluated as to the importance of losing human touch. AI should not replace relationships or human interaction as needed."
        section: "Policy"
      - text: "Using AI to help complete tasks more quickly and efficiently should create opportunities to interact further with others and allow critical thinking to occur."
