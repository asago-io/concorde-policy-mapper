- id: atlas-membership-inference-attack
  name: Membership inference attack
  evidence:
  - text: Any information you input into an AI prompt, or ask an AI tool to analyse, may be stored by the AI provider and used to help further train its products and models.
  - text: This also means that any data you supply may surface in responses made to other people's queries.
