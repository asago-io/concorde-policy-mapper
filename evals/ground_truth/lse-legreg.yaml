- id: mit-ai-risk-subdomain-3.2
  name: Pollution of information ecosystem and loss of consensus reality
  evidence:
  - text: AI tools are known to hallucinate, namely supplying information that has no basis in reality, or else reproducing information that is out of date or is misinformation.
  - text: Generative AI tools can produce believable content with human-like results. However, the information is based on large volumes of data, some of which can be inaccurate, biased, or discriminatory.
