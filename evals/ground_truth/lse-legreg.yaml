  evidence:
  - text: Avoid using a tool just because it's available. Use it because it will make a task like analysis quicker or help you start a writing task by providing prompts or a draft to work on.
    section: General points for using AI
  - text: Don't just use AI because you can, but because it helps processing the data.
    section: Data Protection principles and AI
  - text: Think about the purpose of using AI for the task you want to use it for. While it is fine to play about with the tools as you are learning to use them, you can avoid most of the legal and regulatory
      pitfalls relating to AI by understanding what it is you want to do.
