risks:
- id: atlas-hallucination
  name: Hallucination
  evidence:
  - text: Inaccurate output can also be generated regardless of the training data. The generative AI system may produce a confident response that appears plausible; however, the response is fabricated and
      divorced from reality (sometimes referred to as "hallucinations"). In one recent example, a user doing legal research using generative AI was provided several court decisions, and the decisions provided
      by the generative AI system turned out to be non-existent and completely fabricated.
    section: 5.2.3 Accountability, Review, and Verification
  - text: Generative AI outputs that are inaccurate or misleading in communications to the public or relying on inaccurate or misleading outputs to inform agency programs or policies.
    section: 5.2.2 Risk Assessment
- id: atlas-over-or-under-reliance
  name: Over or Under Reliance
  evidence:
  - text: Agencies shall ensure that AI solutions have appropriate interventions and checks from humans, otherwise known as human in the loop (HITL) procedures, meaning there is active human participation
      in the decision-making process, review, oversight, and validation of AI systems including any generated content or output.
    section: 5.1.1 Decision Making
  - text: Generative AI outputs are not to be used to make decisions for or on behalf of employees. Employees may use generative AI outputs to inform a larger decision-making process, but ultimately the
      Commonwealth employee or official remains the final decision maker.
    section: 5.2.6.3 Decision Making
  - text: Generative AI cannot make reliable subjective or value-based judgments and may not be used for such purposes.
    section: 5.2.6.3 Decision Making
- id: credo-risk-016
  name: Over/under-reliance on AI
  evidence:
  - text: Human in the loop (HITL) refers to the process of consistent human input in the development, deployment, and maintenance of AI solutions. Human in the loop processes ensure the outputs of the
      AI solution yield the best possible results and do not amplify or create unintended consequences.
    section: 5.1.3 Human in the Loop Methodology
- id: mit-ai-risk-subdomain-5.1
  name: Overreliance on AI systems
  evidence:
  - text: Users must review and verify all output produced with the assistance of generative AI. The user will be accountable for any decision-making based upon such output.
    section: 5.2.6.3 Decision Making
- id: credo-risk-019
  name: Loss of human agency
  evidence:
  - text: Generative AI outputs are not to be used to make decisions for or on behalf of employees. Employees may use generative AI outputs to inform a larger decision-making process, but ultimately the
      Commonwealth employee or official remains the final decision maker.
    section: 5.2.6.3 Decision Making
- id: mit-ai-risk-subdomain-5.2
  name: Loss of agency and autonomy
  evidence:
  - text: Generative AI outputs are not to be used to make decisions for or on behalf of employees. Employees may use generative AI outputs to inform a larger decision-making process, but ultimately the
      Commonwealth employee or official remains the final decision maker.
    section: 5.2.6.3 Decision Making
- id: atlas-decision-bias
  name: Decision Bias
  evidence:
  - text: AI solutions may exhibit algorithmic bias, which may result in algorithmic discrimination, which are instances when automated systems contribute to unjustified treatment or disfavoring of people
      or communities based on protected legal classifications.
    section: 5.1.2 Data Sets
  - text: Protocols and procedures for assessing and handling inquiries or accidental events regarding AI system anomalies with priority given for decisions that have potential implications for public safety
      or perceived workforce/labor discriminatory practices.
    section: 5.1.6 Governance
- id: atlas-output-bias
  name: Output Bias
  evidence:
  - text: 'Bias: Since the data used to train generative AI is vast, from a variety of sources, and not always vetted, outputs may contain inaccurate assumptions or stereotypes regarding certain individuals
      or communities.'
    section: 5.2.3 Accountability, Review, and Verification
  - text: Reinforcing existing bias in work products due to bias in generative AI outputs.
    section: 5.2.2 Risk Assessment
- id: atlas-data-bias
  name: Data Bias
  evidence:
  - text: Users often do not know the types of datasets used to develop AI software; because of this, AI solutions may exhibit algorithmic bias, which may result in algorithmic discrimination, which are
      instances when automated systems contribute to unjustified treatment or disfavoring of people or communities based on protected legal classifications.
    section: 5.1.2 Data Sets
  - text: Data availability, quality, and integrity are critical for AI systems. AI systems should not be trained with data that is biased, inaccurate, incomplete, or misleading.
    section: 5.1.7 Data Management
- id: mit-ai-risk-subdomain-1.1
  name: Unfair discrimination or treatment
  evidence:
  - text: algorithmic discrimination, which are instances when automated systems contribute to unjustified treatment or disfavoring of people or communities based on protected legal classifications
    section: 5.1.2 Data Sets
- id: atlas-personal-information-in-prompt
  name: Personal Information in Prompt
  evidence:
  - text: 'No class C data, as defined in the Data Classification Policy, may be input into any generative AI prompt, tool, or system. This includes, but is not limited to: Sensitive Security Information,
      Personal Identifiable Information (PII), Protected Health Information (PHI)'
    section: 5.2.6.2 Private and Sensitive Data
- id: atlas-confidential-data-in-prompt
  name: Confidential Data in Prompt
  evidence:
  - text: under no circumstances should production code or proprietary information be used in prompts.
    section: 5.2.6.1 Production Code and Proprietary Information
  - text: Sharing private or confidential information in a generative AI prompt.
    section: 5.2.2 Risk Assessment
  - text: 'No class C data, as defined in the Data Classification Policy, may be input into any generative AI prompt, tool, or system. This includes, but is not limited to: Sensitive Security Information,
      Personal Identifiable Information (PII), Protected Health Information (PHI), Regulated Data, Confidential or Non-Public Information, Privileged Information, Prerequisite-Required Information'
    section: 5.2.6.2 Private and Sensitive Data
- id: atlas-revealing-confidential-information
  name: Revealing Confidential Information
  evidence:
  - text: 'Confidential, Non-Public Information: Since the data used to train generative AI is vast, from a variety of sources, and not always vetted, outputs may contain confidential, non-public information.'
    section: 5.2.3 Accountability, Review, and Verification
- id: atlas-exposing-personal-information
  name: Exposing Personal Information
  evidence:
  - text: 'Confidential, Non-Public Information: Since the data used to train generative AI is vast, from a variety of sources, and not always vetted, outputs may contain confidential, non-public information.'
    section: 5.2.3 Accountability, Review, and Verification
  - text: AI systems should only collect, use, share, and store data in accordance with privacy and personal data laws and best practices.
    section: 5.1.9 Security
- id: atlas-personal-information-in-data
  name: Personal Information in Data
  evidence:
  - text: 'No class C data, as defined in the Data Classification Policy, may be input into any generative AI prompt, tool, or system. This includes, but is not limited to: Sensitive Security Information,
      Personal Identifiable Information (PII), Protected Health Information (PHI)'
    section: 5.2.6.2 Private and Sensitive Data
- id: credo-risk-036
  name: Compromised PII
  evidence:
  - text: 'Personal Identifiable Information (PII), Protected Health Information (PHI), Regulated Data – Such as data from or regulated by: Social Security Administration (SSA), Internal Revenue Service
      (IRS), Centers for Medicare & Medicaid Services (CMS), Criminal Justice Information (CJI), Criminal History Record Information Act (CHRIA), Family Educational Rights and Privacy Act (FERPA), Payment
      Card Industry Data Security Standard (PCI DSS)'
    section: 5.2.6.2 Private and Sensitive Data
- id: credo-risk-037
  name: Compromised sensitive information
  evidence:
  - text: Confidential or Non-Public Information, Privileged Information, Prerequisite-Required Information
    section: 5.2.6.2 Private and Sensitive Data
- id: mit-ai-risk-subdomain-2.1
  name: Privacy violations
  evidence:
  - text: any non-public records or information that would be considered privileged or exempt from access under the Right-to-Know Law (RTKL), 65 P.S. §§ 67.101, et seq. may not be input into any generative
      AI prompt, tool, or system.
    section: 5.2.6.2 Private and Sensitive Data
- id: ai-risk-taxonomy-unauthorized-disclosure---pii-(personal-identifiable-information)
  name: Unauthorized disclosure - PII
  evidence:
  - text: Users should not have any expectation of privacy when interacting with generative AI tools. Any data or information that users would not include in public facing documents or emails should never
      be entered into any generative AI tools.
    section: 5.2.5 Data Privacy
- id: atlas-lack-of-system-transparency
  name: Lack of System Transparency
  evidence:
  - text: When a customer is interacting with an AI solution on behalf of an agency, the solution shall disclose to the customer that they are interacting with an AI solution.
    section: 5.1.5 Disclosure
  - text: Users shall be transparent about their use of generative AI and must disclose to customers, residents, visitors, and industry when generative AI has been used to generate content that may be public
      facing or shared externally.
    section: 5.2.4 Disclosure
- id: atlas-non-disclosure
  name: Non-disclosure
  evidence:
  - text: Generative AI use must be disclosed even if it was only used to generate a portion of the content. The disclosure shall be prominently displayed and include an indication that the content was
      generated either entirely or in part by generative AI and identify the Generative AI system and version that was used.
    section: 5.2.4 Disclosure
- id: ai-risk-taxonomy-not-labeling-content-as-ai-generated
  name: Not labeling content as AI-generated
  evidence:
  - text: 'The disclosure shall be prominently displayed and include an indication that the content was generated either entirely or in part by generative AI and identify the Generative AI system and version
      that was used. Example: "ChatGPT-3.5 was used in the creation of this document."'
    section: 5.2.4 Disclosure
- id: atlas-unexplainable-output
  name: Unexplainable Output
  evidence:
  - text: Right to Explanation (RTE) that will obligate Commonwealth agencies to explain the purpose of an algorithm and the kind of data it uses when making automated decisions. This includes third-party
      AI solutions. Agencies shall validate (understand) the functionality of third-party AI algorithms and how the data collected and utilized is managed by the third- party solution.
    section: 5.1.6 Governance
  - text: 'The following elements shall be captured for any AI solution to satisfactorily comply with an RTE request: Technical and design details of the AI system and algorithms, How the AI system was
      trained (including personnel and documentation), How the AI system works (i.e. what are the inputs and outputs), Data sources (documentation of all data sources)'
    section: 5.1.6 Governance
- id: credo-risk-009
  name: Black box decision making
  evidence:
  - text: Agencies shall validate (understand) the functionality of third-party AI algorithms and how the data collected and utilized is managed by the third- party solution.
    section: 5.1.6 Governance
- id: atlas-poor-model-accuracy
  name: Poor Model Accuracy
  evidence:
  - text: 'Inaccurate Information: Generative AI relies on training data. Training data is vast and not always consistent or accurate. Inaccuracies in the training data may be included in the output generated
      by the generative AI system.'
    section: 5.2.3 Accountability, Review, and Verification
  - text: Generative AI content should not be assumed to be accurate.
    section: 5.2.3 Accountability, Review, and Verification
- id: credo-risk-021
  name: False or misleading information
  evidence:
  - text: Generative AI outputs that are inaccurate or misleading in communications to the public or relying on inaccurate or misleading outputs to inform agency programs or policies.
    section: 5.2.2 Risk Assessment
