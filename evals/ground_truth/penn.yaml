    section: 5.1.8 Prompting and Validation
- id: atlas-model-usage-rights
  name: Model Usage Rights
  evidence:
  - text: 'Intellectual Property: Generative AI tools continually ingest publicly available information for training purposes including information that may be subject to copyright. Copyrighted information
      could be inappropriately included in any output generated by the generative AI system, creating intellectual property risks.'
    section: 5.2.3 Accountability, Review, and Verification
  - text: Copyright infringement.
    section: 5.2.2 Risk Assessment
- id: atlas-legal-accountability
  name: Legal Accountability
  evidence:
  - text: Legal reviews required for use of third-party AI services, contracts, licenses, agreements, and specific use cases of AI solutions with potential impacts to workforce.
    section: 5.1.6 Governance
  - text: It is important to understand the potential liabilities with intellectual property and data ownership associated with third party entities. Legal requirements regarding transparency and disclaimers
      for public engagement and use of AI systems.
    section: 5.1.6 Governance
- id: credo-risk-023
  name: Regulatory compliance failures
  evidence:
  - text: AI systems are required to comply with all Commonwealth IT Policies, Management Directives, and any other applicable regulations.
    section: 5.1.9 Security
- id: credo-risk-046
  name: Governance failures
  evidence:
  - text: Proper governance of AI solutions is required prior to deployment of any AI solutions into the enterprise. Governance and appropriate oversight mitigate risks associated with emerging technologies.
    section: 5.1.6 Governance
  - text: Because the use of generative AI tools can pose significant risk depending on the information or data input into the tool, proper governance of such tools is required.
    section: 5.2.2 Risk Assessment
- id: ai-risk-taxonomy-employment
  name: Employment decisions
  evidence:
  - text: For example, do not use generative AI to make final decisions that affect employment.
    section: 5.2.6.3 Decision Making
  - text: 'AI solutions that are used to formulate high-risk decisions regarding the topics listed below will be subject to audits: Direct or indirect material financial interests or transactions, Administrative
      policy and program changes, Benefits eligibility and determinations'
    section: 5.1.4 Retention
- id: ai-risk-taxonomy-government-services
  name: Government services
  evidence:
