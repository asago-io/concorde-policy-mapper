risks:
- id: ai-risk-taxonomy-ip-rights/-trade-secrets
  name: IP Rights/ Trade Secrets
  evidence:
  - text: Lack of transparency on the origin of materials used for training generative AI models raises concerns related to intellectual property (IP) rights, regardless of whether the tool is internal
      or external.
    section: 2.4. [Rule n°4] Be mindful of potential intellectual property rights violations and avoid directly replicating the output of a generative AI tool in public documents.
  - text: It is possible that copyright protected information has been used for training the AI model and ends up being reproduced in the output. Always assess whether generated output might violate intellectual
      property rights.
    section: 2.4. [Rule n°4] Be mindful of potential intellectual property rights violations and avoid directly replicating the output of a generative AI tool in public documents.
  - text: Anything you write or upload into an external AI tool, as with any other external online tools in general, risks being stored and reused by the service provider, potentially exposing internal
      Commission information.
    section: 2.2. [Rule n°2] Do not use non-public or personal data in external Al tools and ensure proper handling of sensitive and personal data when using internal AI tools.
