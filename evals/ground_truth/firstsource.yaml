- id: ai-risk-taxonomy-content-abetting/involving/furthering-activities-violating-any-applicable-law
  name: Content abetting/involving/furthering activities violating any applicable law
  evidence:
  - text: Employees must not use AI programs to create or disseminate malicious software or engage in hacking or other unauthorized activities.
    section: Don'ts
  - text: Employees must not use AI programs to engage in activities that could damage the reputation of the company or violate the Privacy rights of others.
    section: Don'ts
  - text: Employees should not use, implement or develop any AI tool that is prohibited by regulation/law.
    section: 7. Prohibited AI Tools
- id: ai-risk-taxonomy-not-labeling-content-as-ai-generated
  name: Not labeling content as AI-generated
  evidence:
  - text: Clearly attribute AI-generated content, indicating that it was created with the assistance of an AI tool, to maintain transparency.
    section: 8.3 Additional Restrictions
  - text: 'If an AI feature shall directly present a response to customers or third parties without human review or intervention, you must disclose to the customer that they are: Engaging solely with an
      AI.'
    section: 8.4 AI-Generated Output Guardrails
  - text: Properly attribute any AI-generated content and be transparent about its use in reports, presentations, and communications.
    section: 8.1 Guidelines
