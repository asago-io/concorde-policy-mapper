  name: Data transfer restrictions
  evidence:
  - text: Establish clear protocols for sharing data with third-party AI tools, including agreements on data usage and security measures.
    section: 8.2 Data Guardrails
  - text: When data is transferred between different components or systems within an AI infrastructure, secure communication protocols (e.g., HTTPS, VPN / IPSec) should be employed to protect data integrity
      and confidentiality. This is particularly important when data is transmitted over public networks or shared with external entities. The Data when exchanged with external entities, this must be restricted
      to whitelisted IP addresses or through Secure VPN tunnel.
    section: 10. Data Privacy and Security in AI Systems
