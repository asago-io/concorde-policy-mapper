    section: 14. General Consumer Data Rights
    page: 14
  - text: Only input the data you need. Only input data that is required for the purpose for which you are using the AI tool
    section: 8.2 Data Guardrails
    page: 7
- id: atlas-confidential-data-in-prompt
  name: Confidential data in prompt
  evidence:
  - text: Do not upload or input any confidential, proprietary, or sensitive Company information into any GenAI tool. Examples include passwords and other credentials, protected health information, personnel
      material, information from documents marked Confidential, Sensitive, or Proprietary, or any other nonpublic Company information that might be of use to competitors or harmful to the Company if disclosed.
    section: 8.3 Additional Restrictions
  - text: Employees must not disclose any company information, client specific information or trade secrets to any third party, including AI tools, programs such as ChatGPT, Gemini, and Midjourney.
    section: Do's
  - text: Treat every bit of information you provide to a GenAI tool as if it shall go viral on the Internet, attributed to you or the Company, regardless of the settings you have selected within the tool
      (or the assurances made by its creators).
    section: 8.1 Guidelines
