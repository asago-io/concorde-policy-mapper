- id: ai-risk-taxonomy-non-consensual-tracking/monitoring/stalking/spyware---pii-(personal-identifiable-information)
  name: Non-consensual tracking/monitoring/stalking/spyware - PII (Personal Identifiable Information)
  evidence:
  - text: The next day, the manager sends a prompt to the enterprise Generative AI tool within the collaboration platform, asking "what were the main points discussed at the meeting?". The enterprise Generative
      AI tool responds with a summary of the details about the other staff member and their request for family violence leave.
    section: Collection of personal information
  - text: enterprise Generative AI tools use documents from an organisation's information holdings to generate content in response to a user prompt, they could provide the user with personal information
      with which they were previously unfamiliar
    section: Use and disclosure of personal information
- id: ai-risk-taxonomy-unauthorized-collection/gathering/stealing---health-data
  name: Unauthorized collection/gathering/stealing - Health data
  evidence:
  - text: the HR team joins the meeting and see a message from the manager that they can no longer attend. They decide that without the manager, there is no point discussing the matter but, since they have
      all set aside 30 minutes for the meeting, they use the time to instead discuss another matter, relating to a different staff member's request for family violence leave.
    section: Collection of personal information
  - text: The generation of the summary content by the enterprise Generative AI tool is a collection of personal information, which would likely contravene at least IPP 1.1 (as the manager had no need to
      know that information).
    section: Collection of personal information
  - text: an organisation must only collect personal information if it is necessary to fulfill one or more of its functions. The collection must be lawful, fair and not unreasonably intrusive.
    section: Collection of personal information
