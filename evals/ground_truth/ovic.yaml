    section: Collection of personal information
  - text: Human error is the leading cause of data breaches reported to OVIC involving unauthorised use and disclosure of personal information. Without proper controls in place, the implementation of an
      enterprise Generative AI tool could exacerbate this, given the increased speed at which personal information can be generated, used, and disclosed.
    section: Use and disclosure of personal information
