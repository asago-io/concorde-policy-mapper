- id: atlas-impact-on-affected-communities
  name: Impact on affected communities
  evidence:
  - text: Staff should critically reflect on how AI-assisted practices affect student perceptions of authenticity, trust, and fairness. Staff are encouraged to seek student feedback on these practices.
    section: Guidelines for Implementation
  - text: Students question the authenticity of AI-generated comments, finding them impersonal and ethically inconsistent, especially when their own GenAI use may be discouraged.
    section: Research Context and Rationale
  - text: Without proper guidance, integrating GenAI into educational practices could undermine the integrity and quality of education we provide.
    section: Why Guidance is Needed
