- id: atlas-incomplete-usage-definition
  name: Incomplete usage definition
  evidence:
  - text: 'The paper draws a clear distinction between AI-assisted marking and feedback and automated marking and feedback: AI-assisted marking and feedback: Human educators use AI tools to support and
      enhance their work, with full human oversight and final decision-making at every stage. AI-generated marking and feedback: AI systems independently generate marks and feedback with minimal or no human
      involvement.'
    section: Introduction
  - text: The use AI-generated marking and feedback, where AI systems independently generate marks and/or feedback with minimal or no human involvement is not permitted.
    section: Introduction
