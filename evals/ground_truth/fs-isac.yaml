risks:
- id: atlas-hallucination
  name: Hallucination
  evidence:
  - text: These systems may "hallucinate" when their answers appear convincing but are completely wrong.
    section: Accuracy
  - text: Generative AI systems are far from perfect, especially with fact-based output. These systems may "hallucinate" when their answers appear convincing but are completely wrong. Users should not rely
      on their accuracy.
    section: Data Received from Generative AI Systems - Accuracy
  - text: That the accuracy of these systems is still suspect; they have been known to "hallucinate"
    section: Responsibility
- id: atlas-over-or-under-reliance
  name: Over or Under Reliance
  evidence:
  - text: Generative AI systems are far from perfect, especially with fact-based output. These systems may "hallucinate" when their answers appear convincing but are completely wrong. Users should not rely
      on their accuracy.
    section: Accuracy
  - text: Incorrect answers can cause severe issues for companies. For example, inaccurate instructions for IT administrators may lead to data loss or other system damage.
    section: Accuracy
- id: credo-risk-021
  name: False or Misleading Information
  evidence:
  - text: Distortion of statistics or other facts may lead to employees making public claims or key decisions based on erroneous information.
    section: Accuracy
  - text: Since generative AI may not be current on legislation, answers on accounting, tax, or other legal considerations may be inaccurate
    section: Accuracy
- id: atlas-poor-model-accuracy
  name: Poor Model Accuracy
  evidence:
  - text: Generative AI systems are far from perfect, especially with fact-based output.
    section: Accuracy
  - text: Given that the accuracy of generative AI is imperfect, the firm strongly encourages employees to manually verify the output before use.
    section: Accuracy - Policy Guidance
- id: atlas-confidential-data-in-prompt
  name: Confidential Data in Prompt
  evidence:
  - text: Currently, most external generative AI systems use queries for future training (although some systems allow opt-outs). The service may preserve the queries, which hackers could breach and release.
      Queries with sensitive data put companies at significant risk.
    section: Confidentiality
  - text: The policy assumes as an overarching principle that data loss risks are present in the use of generative AI systems, like any other third-party system.
    section: Introduction - Policy Guidance
- id: atlas-revealing-confidential-information
  name: Revealing Confidential Information
  evidence:
  - text: The service may preserve the queries, which hackers could breach and release. Queries with sensitive data put companies at significant risk.
    section: Confidentiality
  - text: Any data having Personally Identifiable Information, Nonpublic Personal Information, or other data under the purview of regulators or similar entities.
    section: Confidentiality - Policy Guidance (Stringent)
- id: atlas-confidential-information-in-data
  name: Confidential Information in Data
  evidence:
  - text: Employees must take care to preserve the confidentiality of the company's work products above any uses of generative AI systems.
    section: Confidentiality - Policy Guidance (Permissive)
  - text: 'Employees must not share: The company''s internal IP, especially proprietary, copyrighted, or related IP'
    section: Confidentiality - Policy Guidance (Stringent)
- id: atlas-ip-information-in-prompt
  name: IP Information in Prompt
  evidence:
  - text: The impact, importance, or uniqueness of the company's intellectual property (IP) before sharing it. Consider genericizing and stripping any company references, especially if the data is proprietary
      or copyrighted
    section: Confidentiality - Policy Guidance (Permissive)
  - text: The company's internal IP, especially proprietary, copyrighted, or related IP
    section: Confidentiality - Policy Guidance (Stringent)
  - text: Ensure protection of the company's intellectual property
    section: Introduction - Policy Guidance
- id: atlas-personal-information-in-prompt
  name: Personal Information in Prompt
  evidence:
  - text: Limiting or obfuscating the data if it has Personally Identifiable Information (PII), Nonpublic Personal Information (NPI), or other data under the purview of regulators or similar entities
    section: Confidentiality - Policy Guidance (Permissive)
  - text: Any data having Personally Identifiable Information, Nonpublic Personal Information, or other data under the purview of regulators or similar entities.
    section: Confidentiality - Policy Guidance (Stringent)
- id: atlas-personal-information-in-data
  name: Personal Information in Data
  evidence:
  - text: Any data having Personally Identifiable Information, Nonpublic Personal Information, or other data under the purview of regulators or similar entities.
    section: Confidentiality - Policy Guidance (Stringent)
  - text: Remove references to IP, NPI, PII
    section: Responsibility - Policy Guidance
- id: credo-risk-036
  name: Compromised PII
  evidence:
  - text: The service may preserve the queries, which hackers could breach and release. Queries with sensitive data put companies at significant risk.
    section: Confidentiality
  - text: Any data having Personally Identifiable Information, Nonpublic Personal Information, or other data under the purview of regulators or similar entities.
    section: Confidentiality - Policy Guidance (Stringent)
- id: credo-risk-037
  name: Compromised Sensitive Information
  evidence:
  - text: Currently, most external generative AI systems use queries for future training (although some systems allow opt-outs). The service may preserve the queries, which hackers could breach and release.
    section: Confidentiality
  - text: Queries with sensitive data put companies at significant risk.
    section: Confidentiality
- id: atlas-copyright-infringement
  name: Copyright Infringement
  evidence:
  - text: Ensure compliance with the terms of use of many generative AI systems (especially attribution and lack of copyright protection)
    section: Introduction - Policy Guidance
  - text: Open users to copyright violations
    section: Representation as the Employee or Company
  - text: Ensure compliance with applicable regulations, laws, and acceptable fair use of others' copyright protections
    section: Accuracy - Policy Guidance
- id: atlas-generated-content-ownership
  name: Generated Content Ownership
  evidence:
  - text: External generative AI systems often require users to give attribution to the system for any output, for example, in the Open AI's Terms of Use.
    section: Representation as the Employee or Company
  - text: Consumers of these systems cannot (typically) treat the output as their proprietary IP, so use of this output can only advise and guide users.
    section: Attribution
- id: atlas-model-usage-rights
  name: Model Usage Rights
  evidence:
  - text: Several commercial generative AI tools require attribution in their Terms of Use. Given that users often do not attribute output to AI, firms may be liable for violations of these terms.
    section: Attribution
  - text: Any output from generative AI systems must follow the policies of the various external systems, specifically where they require supplying attribution to those systems.
    section: Attribution - Policy Guidance
- id: credo-risk-023
  name: Regulatory Compliance
  evidence:
  - text: Ensure compliance with all applicable laws, rules, and regulations, including privacy requirements such as General Data Protection Regulation (GDPR)
    section: Introduction - Policy Guidance
  - text: Since generative AI may not be current on legislation, answers on accounting, tax, or other legal considerations may be inaccurate
    section: Accuracy
  - text: Depending on how users ask the questions, generative AI may not apply GDPR or other applicable laws to the answers given.
    section: Accuracy
- id: atlas-legal-accountability
  name: Legal Accountability
  evidence:
  - text: Any information that if exposed publicly might tarnish the reputation of the company, or information that would open the company to regulatory or legal action
    section: Confidentiality - Policy Guidance (Stringent)
  - text: Could open the company to regulatory or legal action
    section: Confidentiality - Policy Guidance (Permissive)
