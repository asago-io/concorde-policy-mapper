- id: credo-risk-026
  name: Fraud and Scams
  evidence:
  - text: Although generative AI has the power to increase cyber crime through convincing mimicking of existing communications, excellent translation capabilities, deep fake images, audio, and video, ease
      of finding code vulnerabilities, and much more, the kinds of threats still are the same as when using other third-party systems. For instance, phishing emails may become more personalized with generative
      AI
    section: Responsibility
  - text: Employees can use these systems for nefarious purposes, such as proxy avoidance, unapproved network uses, or manipulating financial services transactions for personal gain
    section: Accuracy
