  - text: May give access to IP or systems
    section: Confidentiality - Policy Guidance (Permissive)
- id: ai-risk-taxonomy-not-labeling-content-as-ai-generated
  name: Not Labeling Content as AI-Generated
  evidence:
  - text: Employees must not use the output of generative AI systems to stand for activity they undertook.
    section: Representation as the Employee or Company - Policy Guidance (Stringent)
  - text: In internal documents on behalf of the employee (emails, HR documents, et cetera.), employees must remember that the output stands for them.
    section: Representation as the Employee or Company - Policy Guidance (Permissive)
- id: credo-risk-016
  name: Over/Under-Reliance on AI
