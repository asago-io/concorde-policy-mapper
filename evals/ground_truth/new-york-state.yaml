risks:
- id: ai-risk-taxonomy-not-labeling-content-as-ai-generated
  name: Not labeling content as AI-generated
  evidence:
  - text: Where members of the public interact directly with SE systems that use AI technology, the use of such AI technology should be disclosed by the SE.
    section: 4.4 Transparency
  - text: Using automatic speech recognition with outputs clearly labelled as AI-generated accordingly.
    section: Appendix A - Acceptable and Unacceptable use of AI Examples
  - text: Using an AI-powered chatbot that is not identified as such and that intentionally deceives users.
    section: Appendix A - Acceptable and Unacceptable use of AI Examples
- id: atlas-confidential-data-in-prompt
  name: Confidential data in prompt
  evidence:
  - text: Inputting personally identifiable, confidential, or sensitive information into an AI system where that AI system uses that information to build upon its model and/or may disclose that information
      to an unauthorized recipient.
    section: Appendix A - Acceptable and Unacceptable use of AI Examples
  - text: SEs must develop polices and controls to ensure the appropriate use of all AI systems (e.g., open-source AI systems, publicly available AI systems), particularly in the limited circumstances when
      the SE identifies a need to use the AI system to process personally identifiable, confidential, or sensitive information.
    section: 4.7 Privacy
- id: atlas-data-bias
  name: Data bias
  evidence:
  - text: SE must be aware that systemic, computational, and human biases may impact AI systems and should develop a plan to monitor for such biases, and, where identified, remediated identified biases.
    section: 4.3 Fairness and Equity
  - text: Use of non-vetted data to generate content without human review and without disclosure.
    section: Appendix A - Acceptable and Unacceptable use of AI Examples
- id: atlas-data-privacy-rights
  name: Data privacy rights alignment
  evidence:
  - text: Providing data subjects with control and transparency in relation to data processing.
    section: 4.7 Privacy
  - text: SEs must maintain awareness of how the AI system uses personally identifiable, confidential, or sensitive information to ensure such use complies with applicable laws, rules, regulations, notices,
      and policies.
    section: 4.1 Use of AI
  - text: Privacy-oriented settings, including data minimization, such as only processing data that is necessary during the development and use the AI system.
    section: 4.7 Privacy
- id: atlas-data-usage
  name: Data usage restrictions
  evidence:
  - text: SEs must maintain awareness of how the AI system uses personally identifiable, confidential, or sensitive information to ensure such use complies with applicable laws, rules, regulations, notices,
      and policies.
    section: 4.1 Use of AI
    page: 2
  - text: Data  retention  settings  that  follow  the  requirements  of  federal  and  state  standards;
    section: 4.7 Privacy
    page: 4
- id: atlas-decision-bias
  name: Decision bias
  evidence:
  - text: Use of AI systems must be fair and equitable in accordance with applicable State and Federal laws, rules, and regulations.
    section: 4.3 Fairness and Equity
  - text: SE must be aware that systemic, computational, and human biases may impact AI systems and should develop a plan to monitor for such biases, and, where identified, remediated identified biases.
    section: 4.3 Fairness and Equity
  - text: Examples of such activities include but are not limited to assessments or decisions about individuals including in law enforcement, housing, hiring and employment, financial, educational, or healthcare
      contexts, decisions regarding access to or eligibility for government benefits or about child welfare.
    section: 3.2 Definitions and Covered Use (footnote 3)
- id: atlas-exposing-personal-information
  name: Exposing personal information
  evidence:
  - text: SEs must maintain awareness of how the AI system uses personally identifiable, confidential, or sensitive information to ensure such use complies with applicable laws, rules, regulations, notices,
      and policies.
    section: 4.1 Use of AI
    page: 2
  - text: particularly in the limited circumstances when the SE identifies a need to use the AI system to process personally identifiable,  confidential, or sensitive information.
    section: 4.7 Privacy
    page: 4
- id: atlas-generated-content-ownership
  name: Generated content ownership and IP
  evidence:
  - text: the extent to which a work created by an AI system may contain copyrighted elements.
    section: 4.10 Intellectual Property
    page: 5
- id: atlas-hallucination
  name: Hallucination
  evidence:
  - text: Letting AI make decisions, without thorough testing to confirm accuracy and without review by a human.
    section: Appendix A - Acceptable and Unacceptable use of AI Examples
    page: 7
  - text: Ensuring the accuracy of data put into the AI system and the AI system's outputs;
    section: 4.7 Privacy
    page: 4
- id: atlas-impact-on-affected-communities
  name: Impact on affected communities
  evidence:
  - text: '''Directly impact the public'' shall mean when the use of an AI system would control, have a material impact on, or meaningfully influence the outcome of activities that impact the safety, welfare,
      or rights of the public.'
    section: 3.2 Definitions and Covered Use (footnote 3)
  - text: Examples of such activities include but are not limited to assessments or decisions about individuals including in law enforcement, housing, hiring and employment, financial, educational, or healthcare
      contexts, decisions regarding access to or eligibility for government benefits or about child welfare, or the functioning of emergency services or critical infrastructure.
    section: 3.2 Definitions and Covered Use (footnote 3)
- id: atlas-impact-on-human-agency
  name: AI agents' Impact on human agency
  evidence:
  - text: SEs must ensure that decisions that impact the public are not made without oversight by appropriate  staff, who make the final decisions.
    section: 4.2 Human Oversight
    page: 3
  - text: AI system automatically takes actions that impact the public without human oversight.
    section: Appendix A - Acceptable and Unacceptable use of AI Examples
    page: 7
- id: atlas-incomplete-usage-definition
  name: Incomplete usage definition
  evidence:
  - text: The SE must identify an Information Owner for each AI system that meets the criteria set forth in Section 3.2. The information Owner is responsible for understanding and implementing this policy
      for each AI System in use.
    section: 4.1 Use of AI
  - text: The SE must perform a Risk Assessment for each AI system that meets the criteria set forth in Section 3.2. The Risk Assessment must include a review of all security, privacy, legal, reputational,
      and competency risks as well as the additional risks listed in this policy.
    section: 4.5 AI Risk Assessment and Management
- id: atlas-ip-information-in-prompt
  name: IP information in prompt
  evidence:
  - text: using copyrighted materials as inputs into an AI system
    section: 4.10 Intellectual Property
    page: 5
- id: atlas-lack-of-system-transparency
  name: Lack of system transparency
  evidence:
  - text: Transparency is an important principle of AI governance. Where members of the public interact directly with SE systems that use AI technology, the use of such AI technology should be disclosed
      by the SE.
    section: 4.4 Transparency
  - text: SE users of AI systems must provide meaningful oversight over all decisions made by an AI system and be able to explain the decision or output.
    section: 4.4 Transparency
  - text: Characteristics of trustworthy AI systems are that they are valid and reliable, safe, secure, resilient, accountable, and transparent, explainable and interpretable, privacy-enhanced, and fair
      with harmful bias managed.
    section: 4.5 AI Risk Assessment and Management (footnote 7)
- id: atlas-legal-accountability
  name: Legal accountability
  evidence:
  - text: The Information Owner is responsible for periodically  assessing  the  outputs  of their  in-production  AI  systems to validate continuing  reliability, safety, and fairness.
    section: 4.2 Human Oversight
    page: 3
  - text: Following these processes will result in appropriate ITS reviews and approvals.
    section: 4.9 Technology
