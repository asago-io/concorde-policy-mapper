- id: atlas-impact-on-affected-communities
  name: Impact on affected communities
  evidence:
  - text: Be mindful of community expectations around Generative AI use, and consider any reputational risks from the Victorian Government being seen to use such tools in its work.
    section: Be aware of fairness and human rights
  - text: Use these tools to make decisions, undertake assessments or use them for other administrative actions that may have consequences for individuals, groups or organisations.
    section: Maintain accountability, transparency and explainability
- id: atlas-jailbreaking
  name: Jailbreaking
  evidence:
  - text: Attempt to bypass a Generative AI's built-in safety measures and ethical restrictions (jailbreaking) to produce an inappropriate response.
    section: Consider reliability and safety
- id: atlas-impact-on-human-agency
  name: AI agents' Impact on human agency
  evidence:
  - text: Allow Generative AI to make decisions for the Victorian Government.
    section: When using Generative AI tools
  - text: Use these tools to make decisions, undertake assessments or use them for other administrative actions that may have consequences for individuals, groups or organisations.
    section: When using Generative AI tools
- id: atlas-incomplete-advice
  name: Incomplete advice
  evidence:
  - text: Generative AI tools do not understand real-world context and often produce compelling materials containing incorrect or incomplete information.
    section: Maintain accountability, transparency and explainability
  - text: Rely on Generative AI as the only input to your work (it is just one input). It should not replace your own research, analysis and content development.
    section: Be aware of fairness and human rights
