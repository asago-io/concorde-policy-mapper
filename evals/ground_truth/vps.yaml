  name: Compromised confidential information (Slattery et al., 2024; IBM, 2024;AI, 2023)
  evidence:
  - text: Entering such information into a Generative AI tool could cause an interference with privacy or a data breach
  - text: You should carefully review the information provided to a Generative AI tool as any information you provide may be re-used or divulged to a third-party without a legitimate need to know.
- id: mit-ai-risk-subdomain-7.3
  name: Lack of capability or robustness
  evidence:
  - text: Generative AI tools do not understand real-world context and often produce compelling materials containing incorrect or incomplete information.
  - text: Generative AI models learn from their training data, and if training datasets contain biased or inaccurate information, generated content can inherit these biases and inaccuracies.
- id: ai-risk-taxonomy-unauthorized-processing---financial-records
  name: Unauthorized processing - Financial records
  evidence:
  - text: Not only do the proposal documents contain confidential information, you also have no way of explaining how the offers were compared and how the Generative AI tool arrived at the ranking for each
      vendor.
- id: atlas-harmful-output
  name: Harmful output
  evidence:
  - text: Incomplete or inaccurate training data will lead to incorrect and potentially harmful AI-generated outputs that can be discriminatory, unfair,  unjust or incompatible with human rights.
- id: atlas-impact-on-cultural-diversity
  name: Impact on cultural diversity
  evidence:
  - text: Incomplete or inaccurate training data will lead to incorrect and potentially harmful AI-generated outputs that can be discriminatory, unfair,  unjust or incompatible with human rights.
  - text: Assume or trust that outputs generated are unbiased, accurate or understand local context or nuance.
- id: atlas-poor-model-accuracy
  name: Poor model accuracy
  evidence:
  - text: The accuracy and usability of material created by Generative AI tools relies on the tools’ algorithms and training material.
  - text: Incomplete or inaccurate training data will lead to incorrect and potentially harmful AI-generated outputs
- id: atlas-prompt-injection
  name: Prompt injection attack
  evidence:
  - text: Attempt to bypass a Generative AI’s built-in safety measures and ethical restrictions (jailbreaking) to produce an inappropriate response.
- id: mit-ai-risk-subdomain-6.5
  name: Governance failure
  evidence:
  - text: The Generative AI Guideline requires that you meet all legislative, regulatory and administrative obligations when using Generative AI tools for official work purposes.
