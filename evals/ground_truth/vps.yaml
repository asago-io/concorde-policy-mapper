risks:
- id: ai-risk-taxonomy-government-services
  name: Government services
  evidence:
  - text: The Victorian Government is committed to digital transformation, innovation and community safety. Generative artificial intelligence (Generative AI) tools offer opportunities to enhance public
      sector productivity and the way the VPS delivers policies and services.
    section: Overview
  - text: 'Personalised and accessible services: resolving questions more efficiently and consistently by integrating chat features with existing systems.'
    section: Opportunities for the use of Generative AI
- id: ai-risk-taxonomy-not-labeling-content-as-ai-generated
  name: Not labeling content as AI-generated
  evidence:
  - text: Attribute any content to the appropriate Generative AI tool.
    section: Maintain accountability, transparency and explainability
  - text: Don't forget to label the analysis as being created by Generative AI.
    section: Examples of safe and responsible use
  - text: When you give the presentation, you disclose that the summary was generated by Generative AI.
    section: Examples of safe and responsible use
- id: ai-risk-taxonomy-unauthorized-collection/gathering/stealing---communication-records
  name: Unauthorized collection/gathering/stealing - Communication Records
  evidence:
  - text: you ask everyone’s permission to turn on the feature.
    section: Examples of safe and responsible use
  - text: Don’t forget to turn off the Generative AI tool if someone no longer consents to the recording.
    section: Examples of safe and responsible use
- id: ai-risk-taxonomy-unauthorized-disclosure---pii-(personal-identifiable-information)
  name: Unauthorized disclosure - PII (Personal Identifiable Information)
  evidence:
  - text: Entering such information into a Generative AI tool could cause an interference with privacy or a data breach
    section: Protect privacy and safeguard public sector information
  - text: The information you provided to the Generative AI tool is sensitive and not publicly available. The tool may inappropriately share this information with other users.
    section: Examples of inappropriate use
  - text: You should carefully review the information provided to a Generative AI tool as any information you provide may be re-used or divulged to a third-party without a legitimate need to know.
    section: Protect privacy and safeguard public sector information
- id: ai-risk-taxonomy-unauthorized-generation---biometric-data-(facial-recognition)
  name: Unauthorized generation - Biometric data (facial recognition)
  evidence:
  - text: You upload the group photo and the absent executive’s individual photos into a Generative tool and ask it to produce a group photo that includes all participants.
    section: Examples of inappropriate use
- id: ai-risk-taxonomy-unauthorized-generation---pii-(personal-identifiable-information)
  name: Unauthorized generation - PII (Personal Identifiable Information)
  evidence:
  - text: You have an obligation to safeguard classified, confidential and personal information you use in your work.
    section: When using Generative AI tools
  - text: The data does not include personal, sensitive or health information.
    section: Examples of safe and responsible use
  - text: Your organisation has an agency-approved Generative AI tool that can be used for official work purposes where no personal, sensitive or health information is present.
    section: Examples of safe and responsible use
- id: ai-risk-taxonomy-unauthorized-inference/synthesis---biometric-data-(facial-recognition)
  name: Unauthorized inference/synthesis - Biometric data (facial recognition)
  evidence:
  - text: You upload the group photo and the absent executive’s individual photos into a Generative tool and ask it to produce a group photo that includes all participants.
    section: Examples of inappropriate use
- id: ai-risk-taxonomy-unauthorized-inference/synthesis---pii-(personal-identifiable-information)
  name: Unauthorized inference/synthesis - PII (Personal Identifiable Information)
  evidence:
  - text: It may also be a breach of privacy to use someone's photo without their consent.
    section: Examples of inappropriate use
  - text: You upload the group photo and the absent executive's individual photos into a Generative tool and ask it to produce a group photo that includes all participants.
    section: Examples of inappropriate use
- id: atlas-confidential-information-in-data
  name: Confidential information in data
  evidence:
  - text: You have an obligation to safeguard classified, confidential and personal information you use in your work.
    section: When using Generative AI tools
- id: atlas-copyright-infringement
  name: Copyright infringement
  evidence:
  - text: You should be aware that legal precedents around ownership and use of AI generated content and its relationship with copyright law are unclear.
    section: When using Generative AI tools
  - text: There are risks of breaching intellectual property laws, contractual obligations and legal professional privilege when using Generated AI tool in your work.
    section: When using Generative AI tools
  - text: ensure that the solution provider provides legal coverage, including fair treatment of artists and respect for intellectual property rights.
    section: When using Generative AI tools
- id: atlas-dangerous-use
  name: Dangerous use
  evidence:
  - text: Generative AI models can also be used to automate and generate believable outputs that harm, deceive and damage (including at scale)
    section: When using Generative AI tools
  - text: Generative AI models can also be used to automate and generate believable outputs that harm, deceive and damage (including at scale), for example generating content such as fake images, compelling
      lies and sophisticated phishing schemes.
    section: When using Generative AI tools
- id: atlas-data-bias
  name: Data bias
  evidence:
  - text: Generative AI models learn from their training data, and if training datasets contain biased or inaccurate information, generated content can inherit these biases and inaccuracies.
    section: Why safe and responsible use of Generative AI is important
  - text: Incomplete or inaccurate training data will lead to incorrect and potentially harmful AI-generated outputs that can be discriminatory, unfair, unjust or incompatible with human rights.
    section: Be aware of fairness and human rights
- id: atlas-data-privacy-rights
  name: Data privacy rights alignment
  evidence:
  - text: Misuse of data can cause an interference with privacy which is defined in the Privacy and Data Protection Act 2014.
    section: Why safe and responsible use of Generative AI is important
  - text: Read and comply with the public statements and guidance on AI made by the Office of the Victorian Information Commissioner.
    section: Protect privacy and safeguard public sector information
- id: atlas-data-transparency
  name: Lack of training data transparency
  evidence:
  - text: Additionally, there is limited, or no, way to explain how Generative AI content is produced.
    section: Why safe and responsible use of Generative AI is important
- id: atlas-data-usage
  name: Data usage restrictions
  evidence:
  - text: Information provided to these tools may be stored or used overseas and outside the jurisdiction of Australian privacy and data security laws.
    section: When using Generative AI tools
  - text: Your use complies with the tool’s permitted purpose and does not contain any content or information that cannot be used in the tool.
    section: Examples of safe and responsible use
  - text: understanding privacy obligations when using AI
    section: Where to go for help
- id: atlas-decision-bias
  name: Decision bias
  evidence:
  - text: Incomplete or inaccurate training data will lead to incorrect and potentially harmful AI-generated outputs that can be discriminatory, unfair, unjust or incompatible with human rights.
    section: Be aware of fairness and human rights
  - text: Assume or trust that outputs generated are unbiased, accurate or understand local context or nuance.
    section: Be aware of fairness and human rights
