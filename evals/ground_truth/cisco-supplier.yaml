- id: atlas-exposing-personal-information
  name: Exposing personal information
  evidence:
  - text: 3.10. 'Personal Data' means any information that is about, or can be related to, an identifiable individual. It includes any information that can be linked to an individual or used to directly
      or indirectly identify an individual, natural person. Personal Data shall be considered Confidential Information regardless of the source. Personal Data is Protected Data.
