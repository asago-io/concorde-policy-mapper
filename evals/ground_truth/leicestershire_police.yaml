  evidence:
  - text: The use of AI and in policing is relatively new.
    section: 5.3 What should I consider when using AI?
  - text: While Artificial Intelligence (AI) offers significant potential to enhance policing operations, it also introduces a range of risks that must be carefully managed.
    section: 5.5 Key Risks of Using AI in Policing
