      level of accuracy (performance metric), as well as its limitations and capabilities.
  - text: AI systems shall be developed such that it does not encourage humans to develop attachment and/or empathy of users towards the AI system. AI systems shall clearly signal to end users that its
      social interaction is simulated.
- id: credo-risk-028
  name: Coordinated influence operations (Slattery et al., 2024; IBM, 2024)
  evidence:
  - text: for deception or unfair manipulation of individuals or groups via public forums, media, or moderation of other similar uses.
  - text: systems which undermine human debate or democratic electoral systems.
- id: credo-risk-046
  name: Governance failures (Slattery et al., 2024)
  evidence:
  - text: To ensure adherence and accountability, SAP has made 'Trustworthy AI' a key pillar of its strategy and has committed to guaranteeing the sustainable and safe development of all AI systems.
  - text: This promise SAP keeps by adhering to a governance structure, which ensures the ethical and transparent development of AI solutions.
  - text: AI systems shall be subject to appropriate human oversight, and the rights and freedoms of a human shall exceed that of AI systems.
- id: ai-risk-taxonomy-unauthorized-disclosure---demographic-data
  name: Unauthorized disclosure - Demographic data
  evidence:
  - text: Is the use case including the processing of sensitive personal data like information on sexual orientation, religion, biometric data (including face imaging &/or voice recognition)?
- id: atlas-data-contamination
  name: Data contamination
  evidence:
  - text: The use of data for the testing of AI systems shall comply with applicable data protection, and privacy laws.
  - text: It shall be trained and tested on as expansive as is feasible, representative, relevant, accurate, and generalizable datasets.
- id: atlas-data-provenance
  name: Uncertain data provenance
  evidence:
  - text: The data sets and the processes that produce an AI system's decisions, including those of data gathering and data labelling as well as the algorithms used by the developed AI system, shall be
      documented to allow for traceability and transparency.
  - text: The methods used for developing, testing and validating, and the outcomes of or decisions made by the AI system shall be fully documented
- id: atlas-harmful-output
  name: Harmful output
  evidence:
  - text: safeguard our customers and users from harm, treating all individuals fair and just.
  - text: avoiding unconscious bias, or possible unintended harms.
- id: atlas-improper-usage
  name: Improper usage
  evidence:
  - text: Prevent misuse of the AI system in production.
- id: credo-risk-047
  name: Insufficient upstream transparency (AI, 2023)
  evidence:
  - text: To the extent that a 3rd Party AI system (e.g., 'T ensorFlow') is embedded in SAP solutions, the requirements laid down in this handbook shall apply to the overall SAP software solution. (Passage
      4)
