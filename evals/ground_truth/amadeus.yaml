      the algorithms used to make decisions.
    section: 'II. Amadeus AI Principles For development and deployment/use - 2.4. Transparency: AI tools should be explainable and otherwise transparent'
- id: credo-risk-048
  name: Third-Party Dependencies
  evidence:
  - text: When deploying AI tools, we must use them in accordance with the instructions for use provided by the supplier of the AI tool. This is important because the AI tool might not be accurate in regards
      purposes that the supplier has not approved it for, and not sticking to the instructions could also breach our contractual or other legal obligations.
    section: III. General Rules for deployment/USE of all AI Tools
  - text: Register and keep track all of fine-tuning and/or modifying of third-party models (including LLMs and other foundation models).
    section: III. General Rules for deployment/USE of all AI Tools
