- id: atlas-data-poisoning
  name: Data Poisoning
  evidence:
  - text: we should maintain an appropriate level of robustness and cybersecurity and implement technical measures to protect our systems from faults, internal and external threats, including data poisoning
      and adversarial attacks aimed at manipulating AI outputs., ensuring system integrity and security throughout the AI tool's lifecycle.
    section: 'II. Amadeus AI Principles For development and deployment/use - 2.3. Privacy and security: AI tools should be secure and respect privacy'
- id: credo-risk-041
  name: Vulnerability to Adversarial Attacks
