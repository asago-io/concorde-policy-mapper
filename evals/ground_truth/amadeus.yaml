  evidence:
  - text: At Amadeus, the use, deployment and development of AI must be conducted in line with ethical standards and relevant legal requirements, such as the Regulation (EU) 2024/1689 of the European Parliament
      and of the Council of 13 June 2024 laying down harmonized rules on artificial intelligence
    section: I. Introduction and foundations - 1. Purpose
