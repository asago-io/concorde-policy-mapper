- id: credo-risk-017
  name: Inadequate AI Literacy and Communication
  evidence:
  - text: 'Amadeus'' AI Literacy program aims to provide employees with the skills, knowledge, and understanding that they need to use and manage AI tools responsibly and safely. This includes: 1. Understanding
      AI: Knowing what AI is, how it works, and its potential applications. 2. Awareness of Risks and Opportunities: Being aware of both the benefits and the possible harms AI can bring and understanding
      how certain risks can be mitigated. 3. Informed Use: Being able to make educated decisions about deploying and interacting with AI systems, considering the specific context and the people affected
      by these systems.'
    section: I. Introduction and foundations - 5. Ensuring appropriate understanding of AI
  - text: All Amadeus employees are required to participate in Amadeus's AI training and literacy program.
    section: I. Introduction and foundations - 5. Ensuring appropriate understanding of AI
- id: atlas-human-exploitation
  name: Human Exploitation
  evidence:
  - text: Subliminal, manipulative and/or deceptive techniques with the risk of significant harm. For example, using an AI tool to manipulate people's opinion (by creating fake news) in order to influence
      the outcome of elections.
    section: Annex 1 - AI Prohibited and High-Risk Development and Deployment/Use List
- id: ai-risk-taxonomy-employment
  name: Employment
