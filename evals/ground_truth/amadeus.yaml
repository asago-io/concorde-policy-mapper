- id: atlas-improper-usage
  name: Improper Usage
  evidence:
  - text: Do not use GenAI Tools to create text, audio, or visual content for purposes of committing fraud or to misrepresent an individual's identity.
    section: 'IV. Additional specific rules for usage of generative ai tools: the Generative AI Acceptable Use Policy'
- id: atlas-poor-model-accuracy
  name: Poor Model Accuracy
  evidence:
  - text: Potential shortcomings of AI tools, such as inaccurate/undesirable/unsuitable outputs, persistence of bad patterns, inexplicability/intransparency, security issues, ethical concerns.
    section: I. Introduction and foundations - 3. Rationale for this Policy
  - text: AI tools can become inaccurate or otherwise unreliable over time and when applied in different contexts. We should monitor the operation of the tool.
    section: III. General Rules for deployment/USE of all AI Tools
- id: atlas-unexplainable-output
  name: Unexplainable Output
  evidence:
