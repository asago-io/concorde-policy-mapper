    section: Annex 1 - PROHIBITED PRACTICES
- id: ai-risk-taxonomy-unauthorized-collection/gathering/stealing---biometric-data-(facial-recognition)
  name: Unauthorized collection - Biometric data (facial recognition)
  evidence:
  - text: Untargeted scraping of facial recognition databases. For example, using an AI tool to scrape of facial images from the internet, social media platforms or CCTV footages.
    section: Annex 1 - PROHIBITED PRACTICES
- id: ai-risk-taxonomy-unauthorized-inference/synthesis---biometric-data-(facial-recognition)
  name: Unauthorized inference - Biometric data (facial recognition)
  evidence:
